## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=5.3.0'
  esp_lcd_ek79007:
    version: "^1.0.0"
    rules:
      - if: "target == esp32p4"
  espressif/esp_wifi_remote:
    version: "*"
    rules:
      - if: "target == esp32p4"
  espressif/esp_hosted:
    version: "*"
    rules:
      - if: "target == esp32p4"
  espressif/esp_lcd_touch_gt911: ^1.2.0~2
  espressif/cjson: ^1.7.19
  espressif/usb_host_hid:
    version: "*"
    rules:
      - if: "target == esp32p4"
  espressif/usb:
    version: "=1.1.0"
    rules:
      - if: "target == esp32p4"
  lvgl/lvgl: ^9.4.0
  skuodi/libssh2_esp:
    version: ^1.1.0
    override_path: ../../libssh2_esp
