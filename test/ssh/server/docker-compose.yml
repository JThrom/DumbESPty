# DumbESPty SSH auth/trust test endpoints.
#
# Each service is one test endpoint with a distinct host key type and auth
# policy. All bind to 0.0.0.0 on the host so the ESP32-P4 on the LAN can reach
# them at <host-lan-ip>:<port>.
#
# Bring up:   ./up.sh
# Status:     ./status.sh
# Tear down:  ./down.sh
#
# Host keys persist in ./keys/<endpoint>; the test user's authorized public key
# lives in ./keys/authorized_keys (generated by up.sh).

services:
  # Endpoint A: ed25519-only host key, password auth. (ed25519 hostkey + password)
  ssh-ed25519-password:
    build: .
    container_name: dumbespty-ssh-a
    ports:
      - "2201:22"
    environment:
      ENDPOINT_NAME: a-ed25519-password
      HOSTKEY_TYPES: ed25519
      AUTH_MODE: password
      TEST_USER: tester
    volumes:
      - ./keys:/keys

  # Endpoint B: rsa-only host key, publickey-only auth. (publickey + vault key mgmt)
  ssh-rsa-publickey:
    build: .
    container_name: dumbespty-ssh-b
    ports:
      - "2202:22"
    environment:
      ENDPOINT_NAME: b-rsa-publickey
      HOSTKEY_TYPES: rsa
      AUTH_MODE: publickey
      TEST_USER: tester
    volumes:
      - ./keys:/keys

  # Endpoint C: ecdsa-only host key, keyboard-interactive auth.
  ssh-ecdsa-kbdint:
    build: .
    container_name: dumbespty-ssh-c
    ports:
      - "2203:22"
    environment:
      ENDPOINT_NAME: c-ecdsa-kbdint
      HOSTKEY_TYPES: ecdsa
      AUTH_MODE: kbdint
      TEST_USER: tester
    volumes:
      - ./keys:/keys

  # Endpoint D: ed25519 host key, all auth methods. (auth-method negotiation order)
  ssh-all-methods:
    build: .
    container_name: dumbespty-ssh-d
    ports:
      - "2204:22"
    environment:
      ENDPOINT_NAME: d-ed25519-all
      HOSTKEY_TYPES: ed25519
      AUTH_MODE: all
      TEST_USER: tester
    volumes:
      - ./keys:/keys

  # Endpoint E: rsa host key, none-auth (no authentication). (none/minimal auth path)
  ssh-none:
    build: .
    container_name: dumbespty-ssh-e
    ports:
      - "2205:22"
    environment:
      ENDPOINT_NAME: e-rsa-none
      HOSTKEY_TYPES: rsa
      AUTH_MODE: none
      TEST_USER: tester
    volumes:
      - ./keys:/keys
